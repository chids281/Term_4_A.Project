{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login | QuickBite</title>
    <link rel="stylesheet" href="{% static 'css/auth1.css' %}">
</head>
<body class="auth-page">

<div class="auth-container">

    <div class="auth-left">
        <h1>Welcome Back</h1>
        <p>Login to continue your food journey with QuickBite.</p>
    </div>

    <div class="auth-right">

        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="form-group">
                {{ form.username }}
            </div>

            <div class="form-group">
                {{ form.password }}
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="switch-text">
            Don’t have an account?
            <a href="{% url 'signup' %}">Sign Up</a>
        </p>

    </div>

</div>

</body>
</html>
